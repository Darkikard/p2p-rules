name: Generate p2p-rules

on:
  schedule:
    - cron: '0 3 1 * *'    # 每月 1 号 UTC 3:00 (北京时间 11:00)
  workflow_dispatch:        # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate rules
        run: python3 generate.py --output ./rules/

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/
          git diff --staged --quiet || git commit -m "🔄 Auto-update p2p-rules $(date +%Y-%m-%d)"
          git push
